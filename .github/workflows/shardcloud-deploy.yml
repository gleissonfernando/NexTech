name: Deploy to Shard Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_TOKEN_ID: 5b061ec4-2c46-4506-b567-56c463f7a9d9
      API_APP_ID: 3748bc53-e5aa-4619-827e-1323e3abb267
      APP_URL: https://bots-orvitek.shardweb.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Shard Cloud API key
        env:
          SHARD_CLOUD_API_KEY: ${{ secrets.SHARD_CLOUD_API_KEY }}
        run: |
          if [ -z "$SHARD_CLOUD_API_KEY" ]; then
            echo "::error::Missing repository secret SHARD_CLOUD_API_KEY"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build and preflight check
        run: npm run deploy:check

      - name: Deploy and restart application
        uses: shard-cloud/action@main
        with:
          token: ${{ secrets.SHARD_CLOUD_API_KEY }}
          commands: |
            commit ${{ env.DEPLOY_TOKEN_ID }}
            start ${{ env.DEPLOY_TOKEN_ID }}

      - name: Wait for app to come online (ShardCloud API)
        env:
          SHARD_CLOUD_API_KEY: ${{ secrets.SHARD_CLOUD_API_KEY }}
        run: |
          echo "Polling ShardCloud app status..."
          for attempt in $(seq 1 24); do
            RESPONSE=$(curl --silent --max-time 15 \
              -H "Authorization: Bearer $SHARD_CLOUD_API_KEY" \
              "https://shardcloud.app/api/apps/$API_APP_ID/status" 2>/dev/null || echo '{}')
            echo "Attempt $attempt/24: $RESPONSE"
            if echo "$RESPONSE" | grep -qi '"online"'; then
              echo "App is online."
              exit 0
            fi
            if echo "$RESPONSE" | grep -qiE '"error"|"crashed"'; then
              echo "::error::App entered error/crashed state after deploy."
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for app to come online via ShardCloud API."
          exit 1

      - name: Verify application health
        run: |
          check_api_health() {
            url="${APP_URL}/api/health"
            echo "Checking $url"
            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error --max-time 30 "$url" > /tmp/health.json \
                && grep -q '"status":"ok"' /tmp/health.json; then
                cat /tmp/health.json
                echo
                return 0
              fi
              echo "Waiting for healthy API response ($attempt/12)..."
              sleep 10
            done
            cat /tmp/health.json || true
            return 1
          }

          check_root() {
            url="${APP_URL}/"
            echo "Checking $url"
            for attempt in $(seq 1 6); do
              if curl --fail --silent --show-error --max-time 30 "$url" > /tmp/root.html \
                && ! grep -qi "502 Bad Gateway" /tmp/root.html; then
                head -c 200 /tmp/root.html
                echo
                return 0
              fi
              echo "Waiting for frontend response ($attempt/6)..."
              sleep 10
            done
            head -c 1000 /tmp/root.html || true
            return 1
          }

          check_api_health
          check_root
